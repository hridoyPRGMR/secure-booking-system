<div class="flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold text-slate-900 dark:text-slate-100">Locations</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400">Cities and addresses hotels can be assigned to.</p>
    </div>
    @if (authService.hasPermission('Locations.Create')) {
      <button
        type="button"
        class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-700"
        (click)="openCreate()"
      >
        + Add Location
      </button>
    }
  </div>

  <app-grid-filter [fields]="[]" (filtersChanged)="onFiltersChanged($event)" />

  <app-data-grid
    [data]="items()"
    [columns]="columns"
    [rowActions]="rowActions"
    [trackBy]="trackById"
    [isLoading]="isLoading()"
    [serverSide]="true"
    [total]="total()"
    [(page)]="page"
    [(pageSize)]="pageSize"
    [(sortBy)]="sortBy"
    [(sortOrder)]="sortOrder"
    emptyMessage="No locations yet."
    (actionTriggered)="onRowAction($event)"
  />
</div>

<app-dynamic-slider [(isOpen)]="sliderOpen" [title]="drawerTitle()" position="right" size="md">
  <app-location-form
    [mode]="mode()"
    [initialValue]="formInitialValue()"
    [submitting]="submitting()"
    [serverError]="formError()"
    (saved)="onFormSaved($event)"
    (cancelled)="sliderOpen.set(false)"
  />
</app-dynamic-slider>
